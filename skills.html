  <style>
    body {
  font-family: 'Segoe UI', sans-serif;
  line-height: 1.6;
  background-color: #f9f9f9;
  color: #333;
  margin: 0;
}

nav {
  background: #2c3e50;
  padding: 1rem;
  text-align: center;
}

nav a {
  color: white;
  margin: 0 1rem;
  text-decoration: none;
  font-weight: bold;
}

nav a:hover {
  text-decoration: underline;
}

section {
  padding: 2rem;
  max-width: 800px;
  margin: auto;
}

.project {
  background: #fff;
  padding: 1rem;
  margin: 1rem 0;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
/* Default styles - already in file */
body {
  background-color: #f9f9f9;
  color: #333;
  font-family: 'Segoe UI', sans-serif;
}

/* Dark Mode Styles */
body.dark {
  background-color: #1c1c1c;
  color: #f1f1f1;
}

body.dark nav {
  background-color: #111;
}

body.dark nav a {
  color: #ddd;
}

body.dark .project {
  background: #2c2c2c;
  color: #eee;
}

body.dark a {
  color: #66ccff;
}
/* Basic nav link styles */
nav a {
  color: white;
  margin: 0 1rem;
  text-decoration: none;
  font-weight: 500;
  position: relative;
  transition: color 0.3s ease;
}

/* Hover underline effect */
nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 2px;
  background-color: #f1c40f; /* golden yellow */
  transition: width 0.3s ease;
}

nav a:hover::after {
  width: 100%;
}

/* Hover color change */
nav a:hover {
  color: #f1c40f;
}

/* Active link highlight (if manually applied or via JS) */
nav a.active {
  color: #f1c40f;
}

nav a.active::after {
  width: 100%;
}

  </style>
</head>
<body>

  <script>
  // Apply saved theme on page load
  window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
    }
  }

  function toggleDarkMode() {
    document.body.classList.toggle("dark");
    // Save theme preference
    if (document.body.classList.contains("dark")) {
      localStorage.setItem("theme", "dark");
    } else {
      localStorage.setItem("theme", "light");
    }
  }
</script>
