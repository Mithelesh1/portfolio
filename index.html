<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mithelesh Sharma | Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0f172a;
      color: white;
      line-height: 1.6;
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark {
      background-color: #1c1c1c;
      color: #e0e0e0;
    }

    .hero {
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-color: #0f172a;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      position: relative;
    }

    nav a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #f1c40f;
      transition: width 0.3s ease;
    }

    nav a:hover::after {
      width: 100%;
    }

    .hero-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .hero-text {
      max-width: 600px;
    }

    .hero-text h2 {
      font-size: 2.5rem;
      font-weight: 400;
    }

    .hero-text .dot {
      color: #ff5e57;
    }

    .hero-text h1 {
      font-size: 3rem;
      font-weight: 700;
    }

    .hero-text h3 {
      font-size: 1.8rem;
      font-weight: 300;
      margin: 1rem 0;
    }

    .hero-buttons {
      display: flex;
      gap: 1rem;
    }

    .btn {
      padding: 0.8rem 1.6rem;
      border-radius: 6px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background-color: #ff5e57;
      color: white;
    }

    .btn-outline {
      border: 2px solid #ff5e57;
      color: #ff5e57;
    }

    .btn-outline:hover {
      background-color: #ff5e57;
      color: white;
    }

    .hero-image img {
      width: 320px;
      border-radius: 50%;
      border: 4px solid #ff5e57;
      box-shadow: 0 0 60px rgba(255, 94, 87, 0.3);
    }

    .right-icons {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .right-icons a,
    .right-icons button {
      color: white;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background-color: #111;
      color: #ccc;
      font-weight: bold;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .hero-content {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .hero-image img {
        margin-top: 2rem;
      }
    }
    .hero {
  display: flex;
  height: 100vh;
  background-color: #0f172a;
  color: white;
  padding: 0 4rem;
  align-items: center;       /* ✅ Vertically center */
  justify-content: space-between;
  flex-wrap: wrap;
}

.hero-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;              /* ✅ Full height to center inside */
  max-width: 600px;
}

.hero-text h2 {
  font-size: 3rem;
  font-weight: 400;
}

.hero-text .dot {
  color: #ff5e57;
  font-size: 3rem;
}

.hero-text h1 {
  font-size: 4rem;
  font-weight: 700;
  margin: 0.5rem 0;
}

.hero-text h3 {
  font-size: 2rem;
  font-weight: 300;
}

.hero-image {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;              /* ✅ Vertically center image */
}

.hero-image img {
  width: 400px;              /* ✅ Slightly bigger */
  height: 400px;
  border-radius: 50%;
  border: 4px solid #ff5e57;
  box-shadow: 0 0 60px rgba(255, 94, 87, 0.3);
  object-fit: cover;
}
.hero {
  display: flex;
  height: 100vh;
  background-color: #0f172a;
  color: white;
  padding: 0 6rem;
  align-items: center;           /* ✅ Vertical center */
  justify-content: center;       /* ✅ Horizontal alignment */
  gap: 4rem;                     /* ✅ Space between text and image */
}

.hero-text {
  flex: 1;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;       /* ✅ Align text to the left */
}

.hero-text h2 {
  font-size: 3rem;
  font-weight: 400;
}

.hero-text .dot {
  color: #ff5e57;
  font-size: 3rem;
}

.hero-text h1 {
  font-size: 4rem;
  font-weight: 700;
  margin: 0.5rem 0;
}

.hero-text h3 {
  font-size: 2rem;
  font-weight: 300;
}

.hero-image {
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-image img {
  width: 500px;
  height: 500px;
  border-radius: 50%;
  border: 4px solid #ff5e57;
  box-shadow: 0 0 60px rgba(255, 94, 87, 0.3);
  object-fit: cover;
}
.hero-text h2 {
  text-shadow: 0 0 10px #ff5e57, 0 0 20px #ff5e57;
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
  from {
    text-shadow: 0 0 5px #ff5e57;
  }
  to {
    text-shadow: 0 0 20px #ff5e57, 0 0 30px #ff5e57;
  }
}
.typing-text {
  border-right: 2px solid #ff5e57;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  display: inline-block;
  animation: typing 3s steps(20, end) forwards;
}

@keyframes typing {
  from { width: 0; }
  to { width: 18ch; }  /* Adjust for text length */
}


  </style>
</head>
<body>
  <section class="hero">
    <nav>
      <ul>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="right-icons">
        <LI>
        <button id="themeToggle" onclick="toggleDarkMode()">🌙</button>
        </LI>
      </div>
    </nav>
    <div class="hero-content">
      <div class="hero-text">
        <h2>Hello<span class="dot">.</span></h2>
        <h1>I’m Mithelesh</h1>
        <h3>Software Developer</h3>
        <div class="hero-buttons">
          <a href="Mithelesh_Sharma_CV.pdf.pdf" download class="btn btn-outline">My Resume</a>
        </div>
      </div>
      <div class="hero-image">
        <img src="images/mithelesh.jpg.jpg" alt="Mithelesh Sharma">
      </div>
    </div>
  </section>
  <footer>
    &copy; 2025 Mithelesh Sharma
  </footer>
  <script>
    // Theme Toggle
    window.onload = function () {
      const theme = localStorage.getItem("theme");
      if (theme === "dark") {
        document.body.classList.add("dark");
        document.getElementById("themeToggle").textContent = "🌞";
      }
    };

    function toggleDarkMode() {
      document.body.classList.toggle("dark");
      const isDark = document.body.classList.contains("dark");
      document.getElementById("themeToggle").textContent = isDark ? "🌞" : "🌙";
      localStorage.setItem("theme", isDark ? "dark" : "light");
    }
  </script>
  <script>
  document.querySelector('.typing-text').textContent = "Software Developer";
</script>

</body>
</html>
