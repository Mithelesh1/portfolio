/* Default styles - already in file */
body {

  color: #333;
  font-family: 'Segoe UI', sans-serif;
}

/* Dark Mode Styles */
body.dark {
  background-color: #1c1c1c;
  color: #f1f1f1;
}

body.dark nav {
  background-color: #111;
}

body.dark nav a {
  color: #ddd;
}

body.dark .project {
  background: #2c2c2c;
  color: #eee;
}

body.dark a {
  color: #66ccff;
}
/* Basic nav link styles */
nav a {
  color: white;
  margin: 0 1rem;
  text-decoration: none;
  font-weight: 500;
  position: relative;
  transition: color 0.3s ease;
}

/* Hover underline effect */
nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 2px;
  background-color: #f1c40f; /* golden yellow */
  transition: width 0.3s ease;
}

nav a:hover::after {
  width: 100%;
}

/* Hover color change */
nav a:hover {
  color: #f1c40f;
}

/* Active link highlight (if manually applied or via JS) */
nav a.active {
  color: #f1c40f;
}

nav a.active::after {
  width: 100%;
}

</style>
